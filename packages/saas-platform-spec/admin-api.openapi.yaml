    # ── Feature-/Quota-/Capability-Katalog (Discovery-Pflege) ──
    /catalog/capabilities:
        get: { tags: [catalog], summary: Discoverte Capabilities auflisten, responses: { '200': { description: Liste } } }

    /catalog/features:
