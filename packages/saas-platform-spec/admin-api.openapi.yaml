openapi: 3.1.0

# SaaS-Plattform · SuperAdmin-API-Vertrag
# Paket: @saasicat/spec
#
# NORMATIVER Vertrag für das SuperAdmin-Backend. Jede Implementierung
# (Referenz: @saasicat/nest) MUSS diesen Vertrag erfüllen. Acceptance-Tests
# in saas-platform-spec/acceptance/ validieren Implementierungen gegen genau
# diese Endpoints.
#
# Pfad-Konvention (siehe SPEC §8.1): Alle Admin-Endpoints liegen unter
# `/api/v1/admin/...`. Der `v1`-Prefix entspricht dem globalPrefix der
# Konsumenten-Backends. Frontend-Slug `/admin/...`
# ist unabhängig konfigurierbar.
#
# Nicht enthalten (bewusst):
#   - Tenant-Endkunden-API (Self-Service Plan-Wechsel) — separate Datei
#   - Onboarding-API — separate Datei (nutzt PromoCode-Preview)
#   - X-Rechnung — eigenes Paket, eigene OpenAPI-Datei

info:
    title: SaaS-Plattform SuperAdmin-API
    version: 0.1.0-draft
    description: |
        Read- und Write-Operationen für die Plattform-Verwaltung:
        Tenants, Users, Subscriptions, Promo-Codes, Audit-Log,
        Manifest-Discovery, plus Plan-Catalog-Lookup.
        Authentifizierung via JWT mit Rolle SUPER_ADMIN; alle schreibenden
        Operationen verlangen zusätzlich einen TOTP-Code im Header
        X-Mfa-Code, sofern der Admin MFA aktiviert hat (sonst 401
        MFA_REQUIRED). Manifest ist nie Security-Quelle (siehe SPEC §10.4).

servers:
    - url: https://{host}/api/v1/admin
      variables:
          host:
              default: localhost:3000
              description: Konsumenten-spezifischer Host (Domain der jeweiligen App)

tags:
    - name: tenants
    - name: users
    - name: plans
    - name: subscriptions
    - name: promo-codes
    - name: audit
    - name: dashboard
    - name: mfa
    - name: manifest
    - name: catalog

security:
    - bearerAuth: []

paths:
    # ────────────────────────────────────────────────────────
    # Manifest (UI-Discovery, SPEC §4 + §8.2-8.3)
    # ────────────────────────────────────────────────────────

    /boot:
        get:
            tags: [manifest]
            security: [] # PUBLIC — kein Auth
            summary: Minimale Branding-Konfiguration für die Login-Seite
            description: |
                Pre-Login-Boot. Enthält ausschließlich Branding (project.key,
                displayName, logoUrl, environment) — KEINE Capabilities, Pages,
                oder Endpoints. Schema verbietet weitere Felder. Siehe SPEC §10.4.
            responses:
                '200':
                    description: Public-Boot
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [project]
                                additionalProperties: false
                                properties:
                                    project:
                                        type: object
                                        required: [key, displayName]
                                        additionalProperties: false
                                        properties:
                                            key: { type: string }
                                            displayName: { type: string }
                                            logoUrl: { type: string }
                                            environment:
                                                {
                                                    type: string,
                                                    enum: [production, staging, development],
                                                }

    /manifest:
        get:
            tags: [manifest]
            summary: Vollständiges UI-Discovery-Manifest (auth-pflichtig)
            description: |
                Auth-Pflicht: SUPER_ADMIN. Lehnt non-SUPER_ADMIN-Requests mit 403 ab.
                Cache: ETag = manifestHash + Cache-Control private, max-age=60,
                must-revalidate. Schema in admin-manifest.schema.json.
            parameters:
                - name: If-None-Match
                  in: header
                  schema: { type: string }
                  description: ETag = manifestHash. Bei Match → 304.
            responses:
                '200':
                    description: Manifest
                    headers:
                        ETag:
                            schema: { type: string }
                        Cache-Control:
                            schema: { type: string }
                            example: 'private, max-age=60, must-revalidate'
                    content:
                        application/json:
                            schema:
                                $ref: 'admin-manifest.schema.json'
                '304':
                    description: Unverändert seit ETag
                '403':
                    description: Nicht SUPER_ADMIN

    /manifest/reload:
        post:
            tags: [manifest]
            summary: Manifest neu aufbauen (nach plans.yaml-Änderung)
            x-mfa-required: true
            responses:
                '200':
                    description: Geladen
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [manifestHash, reloadedAt]
                                properties:
                                    manifestHash: { type: string }
                                    reloadedAt: { type: string, format: date-time }

    # ────────────────────────────────────────────────────────
    # Dashboard
    # ────────────────────────────────────────────────────────
    /dashboard/stats:
        get:
            tags: [dashboard]
            summary: Globale Plattform-Kennzahlen
            responses:
                '200':
                    description: KPIs
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DashboardStats'

    # ────────────────────────────────────────────────────────
    # Plan-Catalog (read-only — Pflege via Datei + Reload-Endpoint)
    # ────────────────────────────────────────────────────────
    /plans:
        get:
            tags: [plans]
            summary: Aktuell geladener Plan-Catalog
            responses:
                '200':
                    description: Catalog
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PlanCatalog'

    /plans/reload:
        post:
            tags: [plans]
            summary: Plan-Catalog neu von Datei laden (für Admin-CLI / Hot-Reload-Dev)
            x-mfa-required: true
            responses:
                '200':
                    description: Geladen
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    loadedAt: { type: string, format: date-time }
                                    planCount: { type: integer }
                                    source: { type: string, description: Pfad oder URL }

    /plans/last-update:
        get:
            tags: [plans]
            summary: Wann wurde der Catalog zuletzt geladen + Hash
            responses:
                '200':
                    description: Meta
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    loadedAt: { type: string, format: date-time }
                                    hash: { type: string, description: SHA-256 des YAML-Inhalts }

    # ────────────────────────────────────────────────────────
    # Tenants
    # ────────────────────────────────────────────────────────
    /tenants:
        get:
            tags: [tenants]
            summary: Liste aller Tenants
            parameters:
                - $ref: '#/components/parameters/Page'
                - $ref: '#/components/parameters/PageSize'
                - name: status
                  in: query
                  schema: { type: string, enum: [active, suspended, deleted] }
                - name: plan
                  in: query
                  schema: { type: string }
                - name: search
                  in: query
                  schema: { type: string, description: 'Volltext über slug/name/email' }
            responses:
                '200':
                    description: Paginierte Liste
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: '#/components/schemas/PaginatedEnvelope'
                                    - properties:
                                          items:
                                              type: array
                                              items: { $ref: '#/components/schemas/AdminTenantRow' }

        post:
            tags: [tenants]
            summary: Tenant manuell anlegen (Bypass des Onboarding-Flows)
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema: { $ref: '#/components/schemas/CreateTenantRequest' }
            responses:
                '201':
                    description: Erstellt
                    content:
                        application/json:
                            schema: { $ref: '#/components/schemas/AdminTenantDetail' }

    /tenants/{slug}:
        parameters:
            - $ref: '#/components/parameters/TenantSlug'
        get:
            tags: [tenants]
            summary: Detail eines Tenants inkl. Subscription, Add-ons, Quota-Verbrauch
            responses:
                '200':
                    description: Detail
                    content:
                        application/json:
                            schema: { $ref: '#/components/schemas/AdminTenantDetail' }
        delete:
            tags: [tenants]
            summary: Tenant soft-deleten (deletedAt setzen)
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [reason, confirmSlug]
                            properties:
                                reason: { type: string, minLength: 10 }
                                confirmSlug:
                                    {
                                        type: string,
                                        description: 'Muss exakt dem Tenant-Slug entsprechen',
                                    }
            responses:
                '200': { description: Gelöscht }

    /tenants/{slug}/suspend:
        parameters:
            - $ref: '#/components/parameters/TenantSlug'
        post:
            tags: [tenants]
            summary: Tenant deaktivieren (login wird blockiert, Daten bleiben)
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [reason]
                            properties:
                                reason: { type: string, minLength: 5 }
            responses:
                '200': { description: Suspended }

    /tenants/{slug}/reactivate:
        parameters:
            - $ref: '#/components/parameters/TenantSlug'
        post:
            tags: [tenants]
            summary: Suspendierten Tenant wieder aktivieren
            x-mfa-required: true
            responses:
                '200': { description: Reaktiviert }

    /tenants/{slug}/impersonate:
        parameters:
            - $ref: '#/components/parameters/TenantSlug'
        post:
            tags: [tenants]
            summary: Kurzzeit-JWT als TENANT_ADMIN für Support-Einblick
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [reason, ttlMinutes]
                            properties:
                                reason: { type: string, minLength: 5 }
                                ttlMinutes: { type: integer, minimum: 5, maximum: 60 }
            responses:
                '200':
                    description: Impersonation-Token
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token: { type: string }
                                    expiresAt: { type: string, format: date-time }
                                    auditId: { type: string }

    /tenants/{slug}/export:
        parameters:
            - $ref: '#/components/parameters/TenantSlug'
        get:
            tags: [tenants]
            summary: GDPR-/Audit-Export aller Tenant-Daten als ZIP
            x-mfa-required: true
            responses:
                '200':
                    description: ZIP-Stream
                    content:
                        application/zip:
                            schema: { type: string, format: binary }

    # ────────────────────────────────────────────────────────
    # Subscription pro Tenant
    # ────────────────────────────────────────────────────────
    /tenants/{slug}/subscription:
        parameters:
            - $ref: '#/components/parameters/TenantSlug'
        get:
            tags: [subscriptions]
            summary: Aktuelle Subscription + Add-ons + effektive Limits
            responses:
                '200':
                    description: Subscription
                    content:
                        application/json:
                            schema: { $ref: '#/components/schemas/SubscriptionDetail' }

        patch:
            tags: [subscriptions]
            summary: Plan, Custom-Limits oder Pilot-Markierung ändern
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                planId: { type: string }
                                billingCycle: { type: string, enum: [MONTHLY, YEARLY] }
                                customLimits:
                                    type: object
                                    additionalProperties:
                                        type: integer
                                        description: 'quotaKey → maxValue (-1 = unbegrenzt)'
                                customMonthlyNet: { type: number, format: decimal }
                                isPilot: { type: boolean }
                                pilotEndsAt: { type: string, format: date-time }
                                pilotNote: { type: string }
                                customNote: { type: string }
            responses:
                '200':
                    description: Geändert
                    content:
                        application/json:
                            schema: { $ref: '#/components/schemas/SubscriptionDetail' }

    # ────────────────────────────────────────────────────────
    # Users
    # ────────────────────────────────────────────────────────
    /users:
        get:
            tags: [users]
            summary: Cross-Tenant-User-Suche
            parameters:
                - name: email
                  in: query
                  schema: { type: string }
                - name: tenantSlug
                  in: query
                  schema: { type: string }
                - $ref: '#/components/parameters/Page'
            responses:
                '200':
                    description: Paginierte Liste
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: '#/components/schemas/PaginatedEnvelope'
                                    - properties:
                                          items:
                                              type: array
                                              items: { $ref: '#/components/schemas/AdminUserRow' }

    /users/{id}/reset-password:
        parameters:
            - name: id
              in: path
              required: true
              schema: { type: string }
        post:
            tags: [users]
            summary: Password-Reset-Mail auslösen (sendet keine Klartext-Passwörter)
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [reason]
                            properties:
                                reason: { type: string, minLength: 5 }
            responses:
                '200': { description: Mail versendet }

    /users/{id}/deactivate:
        parameters:
            - name: id
              in: path
              required: true
              schema: { type: string }
        post:
            tags: [users]
            summary: User deaktivieren (login blockieren)
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [reason]
                            properties:
                                reason: { type: string, minLength: 5 }
            responses:
                '200': { description: Deaktiviert }

    /tenants/{slug}/users/reassign-admin:
        parameters:
            - $ref: '#/components/parameters/TenantSlug'
        post:
            tags: [users]
            summary: TENANT_ADMIN-Rolle auf anderen User übertragen
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [newAdminUserId]
                            properties:
                                newAdminUserId: { type: string }
                                demoteOldAdminTo:
                                    type: string
                                    description: 'Plattform-neutrale Rolle des alten Admins. Default: TENANT_MEMBER.'
                                    default: TENANT_MEMBER
            responses:
                '200': { description: Zugewiesen }

    # ────────────────────────────────────────────────────────
    # Promo-Codes
    # ────────────────────────────────────────────────────────
    /promo-codes:
        get:
            tags: [promo-codes]
            summary: Liste aller Promo-Codes
            parameters:
                - name: status
                  in: query
                  schema: { type: string, enum: [ACTIVE, PAUSED, EXHAUSTED, EXPIRED] }
                - name: campaignTag
                  in: query
                  schema: { type: string }
                - $ref: '#/components/parameters/Page'
            responses:
                '200':
                    description: Liste
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: '#/components/schemas/PaginatedEnvelope'
                                    - properties:
                                          items:
                                              type: array
                                              items: { $ref: '#/components/schemas/PromoCodeDto' }

        post:
            tags: [promo-codes]
            summary: Neuen Promo-Code anlegen
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema: { $ref: '#/components/schemas/CreatePromoCodeRequest' }
            responses:
                '201':
                    description: Erstellt
                    content:
                        application/json:
                            schema: { $ref: '#/components/schemas/PromoCodeDto' }

    /promo-codes/{id}:
        parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
        get:
            tags: [promo-codes]
            responses:
                '200':
                    description: Detail
                    content:
                        application/json:
                            schema: { $ref: '#/components/schemas/PromoCodeDetail' }

        patch:
            tags: [promo-codes]
            x-mfa-required: true
            requestBody:
                required: true
                content:
                    application/json:
                        schema: { $ref: '#/components/schemas/UpdatePromoCodeRequest' }
            responses:
                '200':
                    description: Aktualisiert
                    content:
                        application/json:
                            schema: { $ref: '#/components/schemas/PromoCodeDto' }

        delete:
            tags: [promo-codes]
            summary: Soft-Delete (Audit bleibt erhalten)
            x-mfa-required: true
            responses:
                '200': { description: Gelöscht }

    # ────────────────────────────────────────────────────────
    # Audit-Log
    # ────────────────────────────────────────────────────────
    /audit:
        get:
            tags: [audit]
            summary: Audit-Log mit Filtern
            parameters:
                - name: tenantId
                  in: query
                  schema: { type: string }
                - name: userId
                  in: query
                  schema: { type: string }
                - name: entity
                  in: query
                  schema: { type: string }
                - name: entityId
                  in: query
                  schema: { type: string }
                - name: action
                  in: query
                  schema: { type: string }
                - name: actorTag
                  in: query
                  schema: { type: string, description: 'z. B. cli:* für alle CLI-Aktionen' }
                - name: from
                  in: query
                  schema: { type: string, format: date-time }
                - name: to
                  in: query
                  schema: { type: string, format: date-time }
                - $ref: '#/components/parameters/Page'
            responses:
                '200':
                    description: Liste
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: '#/components/schemas/PaginatedEnvelope'
                                    - properties:
                                          items:
                                              type: array
                                              items: { $ref: '#/components/schemas/AuditEntryDto' }

    # ────────────────────────────────────────────────────────
    # MFA
    # ────────────────────────────────────────────────────────
    /mfa/setup:
        post:
            tags: [mfa]
            summary: TOTP-Setup starten (liefert QR-Code-URI + Secret)
            responses:
                '200':
                    description: Setup-Daten
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    otpauthUri: { type: string }
                                    secret: { type: string }
                                    recoveryCodes:
                                        type: array
                                        items: { type: string }

    /mfa/confirm:
        post:
            tags: [mfa]
            summary: Setup mit erstem Code bestätigen
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [code]
                            properties:
                                code: { type: string, pattern: '^[0-9]{6}$' }
            responses:
                '200': { description: Aktiviert }

    # ────────────────────────────────────────────────────────
    # Catalog V2 — Plan/Bundle/BusinessType/Marketing/Promotion + Discovery
    # (CatalogModule, saas-platform-nest/src/catalog/*; DTO = SSOT für Schemas)
    # ────────────────────────────────────────────────────────

    # ── Plans ──
    /catalog/plans:
        get:
            tags: [catalog]
            summary: Plan-Stämme auflisten
            responses: { '200': { description: Liste } }
        post:
            tags: [catalog]
            summary: Plan-Stamm anlegen
            x-mfa-required: true
            requestBody:
                required: true
                content: { application/json: { schema: { $ref: '#/components/schemas/CatalogPlanCreate' } } }
            responses:
                '201': { description: Erstellt }
                '422': { description: Validierung, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

    /catalog/plans/tenant-counts:
        get:
            tags: [catalog]
            summary: Aktive Subscriptions je planKey (versionsübergreifend)
            description: >-
                Plattformweite Anzahl aktiver Subscriptions gruppiert nach planKey
                (über alle PlanVersionen hinweg). Speist den Default von
                tenantCountsByPlanKey im SuperAdmin-Katalog-UI.
            responses:
                '200':
                    description: Map planKey → Anzahl aktiver Subscriptions
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: { type: integer, minimum: 0 }
                                example: { STARTER: 12, STANDARD: 4, ENTERPRISE: 1 }

    /catalog/plans/{id}:
        parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
        get:
            tags: [catalog]
            summary: Plan-Stamm Detail (inkl. Versionen)
            responses: { '200': { description: Detail } }
        patch:
            tags: [catalog]
            summary: Plan-Stamm aktualisieren (Label/Beschreibung/Icon/sortOrder)
            x-mfa-required: true
            requestBody:
                required: true
                content: { application/json: { schema: { $ref: '#/components/schemas/CatalogStampUpdate' } } }
            responses: { '200': { description: Aktualisiert } }
        delete:
            tags: [catalog]
            summary: Plan-Stamm soft-deleten
            x-mfa-required: true
            responses: { '200': { description: Gelöscht } }

    /catalog/plans/{id}/purge:
        parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
        delete:
            tags: [catalog]
            summary: Plan-Stamm hart löschen (nur ohne aktive Referenzen)
            x-mfa-required: true
            responses:
                '200': { description: Gepurged }
                '422': { description: Noch referenziert, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

    /catalog/plans/{id}/versions:
        parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
        get:
            tags: [catalog]
            summary: PlanVersionen eines Plans auflisten
            responses: { '200': { description: Liste } }
        post:
            tags: [catalog]
            summary: PlanVersion-Entwurf anlegen (unpublished, publishedAt=null)
            x-mfa-required: true
            requestBody:
                required: true
                content: { application/json: { schema: { $ref: '#/components/schemas/CatalogPlanVersionDraft' } } }
            responses: { '201': { description: Entwurf angelegt } }

    /catalog/plan-versions/{id}:
        parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
        get:
            tags: [catalog]
            summary: PlanVersion Detail
            responses: { '200': { description: Detail } }
        patch:
            tags: [catalog]
            summary: PlanVersion-Entwurf aktualisieren (solange unpublished)
            x-mfa-required: true
            requestBody:
                required: true
                content: { application/json: { schema: { $ref: '#/components/schemas/CatalogPlanVersionDraft' } } }
            responses: { '200': { description: Aktualisiert } }
        delete:
            tags: [catalog]
            summary: PlanVersion-Entwurf verwerfen (nur unpublished)
            x-mfa-required: true
            responses: { '200': { description: Verworfen } }

    /catalog/plan-versions/{id}/publish:
        parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
        post:
            tags: [catalog]
            summary: PlanVersion publishen (supersedet Vorgänger)
            description: |
                validFrom ist Pflicht, falls der Entwurf keins trägt, und muss
                strikt nach der Vorgänger-Version liegen. Regressive Diffs
                erfordern forceRegressive; Preis 0,00 erfordert allowZeroPrice.
            x-mfa-required: true
            requestBody:
                required: false
                content: { application/json: { schema: { $ref: '#/components/schemas/CatalogVersionPublish' } } }
            responses:
                '201': { description: Published }
                '422': { description: 'Regression / validFrom / Preis-Gate', content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

    /catalog/plan-versions/{id}/terminate:
        parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
        post:
            tags: [catalog]
            summary: PlanVersion auslaufen lassen (endsAt; ohne Nachfolge-Version)
            x-mfa-required: true
            requestBody:
                required: true
                content: { application/json: { schema: { $ref: '#/components/schemas/CatalogPlanVersionTerminate' } } }
            responses: { '200': { description: Terminiert } }

    # ── Bundles ──
    /catalog/bundles:
        get:
            tags: [catalog]
            summary: Bundle-Stämme auflisten
            responses: { '200': { description: Liste } }
        post:
            tags: [catalog]
            summary: Bundle-Stamm anlegen
            x-mfa-required: true
            requestBody:
                required: true
                content: { application/json: { schema: { $ref: '#/components/schemas/CatalogBundleCreate' } } }
            responses: { '201': { description: Erstellt } }

    /catalog/bundles/{id}:
