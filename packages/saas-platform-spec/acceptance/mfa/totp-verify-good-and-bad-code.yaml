scenario: 'TOTP-Verify accepts good code, rejects bad code'
description: |
    MFA-Mechanik. SuperAdmin hat ein registriertes TOTP-Secret. Bei
    MFA-pflichtigen Endpoints wird X-Mfa-Code geprüft via @levminer/speakeasy
    (Nest) bzw. pyotp (Django). Spec: SPEC §10.5.

setup:
    - createUser:
          email: 'super@platform.example'
          role: 'SUPER_ADMIN'
    - enrollMfa:
          email: 'super@platform.example'
          # TOTP-Secret ist im Test deterministisch via Mock-RNG; der
          # Acceptance-Runner kennt das Secret und kann gültige Codes
          # generieren.

cases:
    - name: 'valid TOTP code'
      request:
          method: POST
          path: /api/v1/admin/tenants/test-mandant/suspend
          auth: { as: 'super@platform.example' }
          headers:
              X-Mfa-Code: '{{generateTotpFor: super@platform.example}}'
          body: { reason: 'test reason' }
      pre:
          - createTenant: { slug: 'test-mandant', email: 'x@test-mandant.example' }
      then:
          status: 200

    - name: 'invalid TOTP code'
      request:
          method: POST
          path: /api/v1/admin/tenants/test-mandant/suspend
          auth: { as: 'super@platform.example' }
          headers:
              X-Mfa-Code: '000000'
          body: { reason: 'test reason' }
      pre:
          - createTenant: { slug: 'test-mandant-2', email: 'y@test-mandant-2.example' }
      then:
          status: 401
          body:
              code: 'MFA_FAILED'

    - name: 'missing TOTP header'
      request:
          method: POST
          path: /api/v1/admin/tenants/test-mandant-3/suspend
          auth: { as: 'super@platform.example' }
          body: { reason: 'test reason' }
      pre:
          - createTenant: { slug: 'test-mandant-3', email: 'z@test-mandant-3.example' }
      then:
          status: 401
          body:
              code: 'MFA_REQUIRED'
