<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>SaaS-Platform UI-Vue E2E Fixture</title>
        <script type="importmap">
            {
                "imports": {
                    "vue": "/node_modules/vue/dist/vue.runtime.esm-browser.prod.js",
                    "vue-router": "/node_modules/vue-router/dist/vue-router.esm-browser.prod.js",
                    "pinia": "/node_modules/pinia/dist/pinia.esm-browser.js",
                    "quasar": "/node_modules/quasar/dist/quasar.client.js",
                    "@saasicat/types": "/node_modules/@saasicat/types/dist/index.js",
                    "@vue/devtools-api": "/tests-e2e/fixtures/devtools-api-stub.js"
                }
            }
        </script>
    </head>
    <body>
        <div id="root">Loading…</div>
        <script type="module">
            // Loads the built platform bundle from ../../dist/index.js. Vue is resolved
            // via importmap from a CDN because the platform bundle marks vue as
            // `external` (see the build script in package.json).
            //
            // Exposes the loaders/composables globally — Playwright tests interact
            // with them via page.evaluate(). Vue itself is not mounted; this is a
            // service-layer test, not a component-render suite.
            try {
                const mod = await import('../../dist/index.js');
                window.__platform = {
                    BootLoader: mod.BootLoader,
                    ManifestLoader: mod.ManifestLoader,
                    ActionRegistry: mod.ActionRegistry,
                    BatchColumnFetcher: mod.BatchColumnFetcher,
                    buildRoutes: mod.buildRoutes,
                    buildSidebar: mod.buildSidebar,
                    useBulkPublish: mod.useBulkPublish,
                    usePlanEditor: mod.usePlanEditor,
                    PlannedOnlyFeatureError: mod.PlannedOnlyFeatureError,
                };
                document.getElementById('root').textContent = 'Platform UI Bundle loaded.';
            } catch (err) {
                document.getElementById('root').textContent = 'Bundle failed: ' + err.message;
                window.__platformError = err.message;
            }
        </script>
    </body>
</html>
