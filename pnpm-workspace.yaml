packages:
  - 'packages/*'
  - 'examples/*'
overrides:
  # GHSA-g7r4-m6w7-qqqr: path traversal in the esbuild dev server. Pulled in
  # transitively by tsup, which still pins ^0.27.0.
  esbuild: '^0.28.1'
allowBuilds:
  '@nestjs/core': true
  # Prisma postinstall downloads the query/schema engines — required for the
  # adapter-prisma integration tests (prisma db push + generate).
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  esbuild: true
  prisma: true
