name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm -r build
      - name: Run unit tests
        run: pnpm -r --workspace-concurrency=1 test
      - name: Lint
        run: pnpm exec eslint .
      - name: Typecheck
        run: pnpm -r typecheck

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build ui-vue and its workspace dependencies
        run: pnpm --filter "@saasicat/ui-vue..." build
      - name: Install Playwright browser
        run: pnpm --filter "@saasicat/ui-vue" exec playwright install --with-deps chromium
      - name: Run Playwright tests
        run: pnpm --filter "@saasicat/ui-vue" test:e2e
