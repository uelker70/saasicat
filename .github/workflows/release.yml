name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fix_access:
        description: "Re-assert public access on the published scoped packages"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm -r build
      # Scoped packages default to `restricted` on npm. The 0.2.0 release went
      # out private despite `access: public` in .changeset/config.json and every
      # publishConfig, which made the public scaffolder point at unreachable
      # dependencies. Writing access=public into .npmrc makes it explicit at the
      # one layer that always wins, regardless of what the toolchain forwards.
      - name: Configure npm auth and public access
        run: |
          {
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "access=public"
          } > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create release pull request or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
      # Belt and braces: a package first published as restricted stays
      # restricted on later publishes, so re-assert visibility after a release
      # (and on demand via the fix_access dispatch input).
      - name: Ensure published packages are public
        if: steps.changesets.outputs.published == 'true' || inputs.fix_access
        run: |
          node -e "
            const {readdirSync,readFileSync,existsSync}=require('fs');
            for (const d of readdirSync('packages')) {
              const f='packages/'+d+'/package.json';
              if (!existsSync(f)) continue;
              const p=JSON.parse(readFileSync(f,'utf8'));
              if (!p.private && p.name.startsWith('@')) console.log(p.name);
            }
          " | while read -r pkg; do
            echo "Setting public access for $pkg"
            npm access set status=public "$pkg"
          done
