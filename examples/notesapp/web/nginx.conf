server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Same-origin API: the SPA calls /api/v1/... and nginx forwards it, so the
    # backend needs no CORS configuration.
    location /api/ {
        # Resolved per request via Docker's embedded DNS. A literal upstream is
        # resolved once at startup, which makes nginx refuse to boot whenever
        # the backend container is not up yet.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://backend:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue router runs in history mode — unknown paths are routes, not files.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
